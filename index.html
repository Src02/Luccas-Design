<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luccas Magalhães | Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- VARIÁVEIS --- */
        :root {
            /* Fundo Azul Marinho Profundo */
            --bg-blueprint: #00121a; 
            --accent-cyan: #00f2ff;
            --accent-green: #25d366;
            --navy-blue: #080c12;
            --text-main: #d1d7e0;
            --glass-bg: rgba(8, 12, 18, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* --- BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-blueprint);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* --- EFEITO CANO DE INFORMAÇÕES (TÚNEL ESTÁTICO) --- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            /* Radial preto 85% que escurece conforme se afasta do centro */
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.85) 100%);
        }

        /* --- CONTAINER DINÂMICO --- */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 900px;
            margin: 0 auto;
            padding: 5vh 0 80px 0;
            gap: 25px;
            z-index: 1;
            position: relative;
        }

        /* --- CARD TOPO --- */
        .card {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            min-height: 300px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
            position: relative;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo-area svg { width: 100px; height: 100px; fill: var(--accent-cyan); margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; text-align: center; }
        .tag { font-size: 12px; opacity: 0.7; margin-top: 10px; letter-spacing: 5px; text-transform: uppercase; }

        @media (min-width: 768px) {
            h1 { font-size: 28px; }
            .tag { font-size: 14px; }
        }

        /* --- SEÇÕES (SKILLS) --- */
        .sections-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .sections-wrapper {
                grid-template-columns: 1fr 1fr;
                gap: 25px;
            }
        }

        .info-block {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .info-block h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-cyan);
            padding-left: 15px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .skill-item {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.9;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .skill-item::before { content: "::"; color: var(--accent-cyan); margin-right: 8px; }

        /* --- BOTÕES --- */
        .bottom-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .bottom-links {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
        }

        .btn-bottom {
            min-height: 60px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-bottom:hover, .btn-bottom.active {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            transform: translateY(-2px);
        }

        /* --- EXPLAINER --- */
        #explainer-box {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 35px;
            display: none;
            border-radius: 12px;
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #explainer-text { font-size: 15px; line-height: 1.8; margin-bottom: 25px; }

        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%; min-height: 50px;
            background: var(--accent-green);
            color: var(--navy-blue);
            text-decoration: none;
            font-size: 13px; font-weight: 900;
            text-transform: uppercase;
            border-radius: 6px;
            transition: 0.3s;
        }

        .action-btn:hover { background: var(--accent-cyan); letter-spacing: 2px; }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="main-container">
        
        <!-- CARD TOPO -->
        <div class="card">
            <div style="font-size: 10px; position: absolute; top: 15px; right: 20px; font-family: monospace; opacity: 0.5; letter-spacing: 1px;">v.1998</div>
            <div class="logo-area">
                <svg viewBox="0 0 100 100">
                    <path d="M10 20V80H35V72H18V20H10ZM40 80H48V35L60 55L72 35V80H80V20H72L60 40L48 20H40V80Z" />
                    <rect x="10" y="86" width="70" height="4" />
                </svg>
            </div>
            <h1>Luccas Magalhães</h1>
            <p class="tag">Graphic Designer</p>
        </div>

        <!-- SEÇÕES -->
        <div class="sections-wrapper">
            <div class="info-block">
                <h2>O que eu posso fazer</h2>
                <div class="skills-grid">
                    <div class="skill-item">Identidade Visual</div>
                    <div class="skill-item">Mídia Social</div>
                    <div class="skill-item">Edição de Vídeo</div>
                    <div class="skill-item">UI / UX</div>
                    <div class="skill-item">Tipografia</div>
                    <div class="skill-item">Design Editorial</div>
                </div>
            </div>

            <div class="info-block">
                <h2>Ferramentas</h2>
                <div class="skills-grid">
                    <div class="skill-item">Photoshop</div>
                    <div class="skill-item">Illustrator</div>
                    <div class="skill-item">InDesign</div>
                    <div class="skill-item">Premiere</div>
                    <div class="skill-item">Affinity</div>
                    <div class="skill-item">Figma</div>
                    <div class="skill-item">CorelDRAW</div>
                </div>
            </div>
        </div>

        <!-- LINKS -->
        <div class="bottom-links">
            <button class="btn-bottom" onclick="showExplainer('sobre', this)">Sobre Mim</button>
            <button class="btn-bottom" onclick="showExplainer('portfolio', this)">Portfólio</button>
            <button class="btn-bottom" onclick="showExplainer('linkedin', this)">LinkedIn</button>
            <button class="btn-bottom" onclick="showExplainer('contato', this)">Contato</button>
        </div>

        <!-- EXPLAINER BOX -->
        <div id="explainer-box">
            <span id="explainer-title" style="font-size: 11px; color: var(--accent-cyan); display: block; margin-bottom: 15px; font-family: monospace;">INFO //</span>
            <p id="explainer-text"></p>
            
            <div id="contact-options" style="display: none; grid-template-columns: 1fr 1fr; gap: 15px;">
                <a href="mailto:luccasmagal@gmail.com" class="action-btn">E-mail</a>
                <a href="https://wa.me/5583981404889" class="action-btn" target="_blank">WhatsApp</a>
            </div>
            
            <a href="#" id="explainer-action" target="_blank" class="action-btn">Acessar Link</a>
        </div>
    </div>

    <!-- 1. IMPORTA O MOTOR JS EXTERNO -->
    <script src="interactive-bg.js"></script>

    <!-- 2. LÓGICA DE INTERFACE -->
    <script>
        const content = {
            sobre: {
                text: "Designer Gráfico focado em traduzir conceitos em soluções visuais precisas. Com uma base técnica sólida, busco unir estética minimalista e funcionalidade em cada projeto. Desenvolvo identidades que comunicam propósito e interfaces que otimizam a experiência do usuário.",
                link: "#", label: ""
            },
            portfolio: { 
                text: "Explorar projetos para ter uma noção básica do que pode ser feito.", 
                link: "https://www.behance.net/luccasmagalhes", label: "Abrir Portfólio" 
            },
            linkedin: { 
                text: "Visualizar histórico profissional e conectar-se na rede.", 
                link: "https://www.linkedin.com/in/luccas-magalh%C3%A3es-34bb22a2/", label: "Acessar LinkedIn" 
            },
            contato: { 
                text: "Selecione o canal de preferência para iniciarmos sua demanda:", 
                link: "#", label: "" 
            }
        };

        function showExplainer(type, element) {
            const box = document.getElementById('explainer-box');
            const text = document.getElementById('explainer-text');
            const title = document.getElementById('explainer-title');
            const action = document.getElementById('explainer-action');
            const contactDiv = document.getElementById('contact-options');
            const buttons = document.querySelectorAll('.btn-bottom');

            if (element.classList.contains('active')) {
                box.style.display = 'none';
                element.classList.remove('active');
                return;
            }

            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            title.innerText = `INFO // ${type.toUpperCase()}`;
            text.innerText = content[type].text;
            
            if (type === 'contato') {
                action.style.display = 'none';
                contactDiv.style.display = 'grid';
            } else if (type === 'sobre') {
                action.style.display = 'none';
                contactDiv.style.display = 'none';
            } else {
                action.style.display = 'inline-flex';
                contactDiv.style.display = 'none';
                action.href = content[type].link;
                action.innerText = content[type].label;
            }

            box.style.display = 'block';
            setTimeout(() => { box.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
        }
    </script>
</body>
</html>
